# Builds and deploys the Vite app to GitHub Pages (Project site).
# Repo → Settings → Pages → Source: GitHub Actions

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - name: Build
        env:
          VITE_RESTOCK_MAIL_TO: ${{ secrets.VITE_RESTOCK_MAIL_TO }}
          VITE_FORMSPREE_FORM_ID: ${{ secrets.VITE_FORMSPREE_FORM_ID }}
          VITE_FORMSPREE_REPLY_EMAIL: ${{ secrets.VITE_FORMSPREE_REPLY_EMAIL }}
        run: npm run build -- --base=/${{ github.event.repository.name }}/
      # configure-pages omitted: it calls the Pages API and 404s until Pages is enabled in repo Settings.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
